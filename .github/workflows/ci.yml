name: CI

# Triggers: every push (any branch), PRs targeting main, and manual dispatch.
on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege default. Jobs requiring more (none here) would opt in explicitly.
permissions:
  contents: read

# Skip the duplicate run that fires when a PR is opened from a branch in the
# same repo (push event + pull_request event would both trigger). For fork PRs
# only the pull_request event fires, so they still run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust (${{ matrix.os }})
    # Avoid double-runs: skip the push event for PR branches that originate in
    # this repo (the pull_request event will cover them). Fork PRs are unaffected.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: traffic_cypher_in_Rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: traffic_cypher_in_Rust

      - name: cargo build --release --bins --locked
        run: cargo build --release --bins --locked

      # Pre-existing race in vault.rs::with_test_vault (env::set_var). Tracked
      # in tests/10_rust_unit_tests.sh; serialised here to match.
      - name: cargo test --release --locked (serial)
        run: cargo test --release --locked -- --test-threads=1

      # Hard gate: the pre-existing clippy lints (see PROJECT_REVIEW.md §10)
      # were cleaned up; `-D warnings` keeps regressions out of `main`.
      - name: cargo clippy --all-targets --locked -- -D warnings
        run: cargo clippy --all-targets --locked -- -D warnings

      # Informational: main currently fails `cargo fmt --check` locally.
      # Flip to a hard gate after the formatting PR.
      - name: cargo fmt --check (informational)
        continue-on-error: true
        run: cargo fmt --check

  c:
    name: c (${{ matrix.os }})
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Ubuntu 24.04 ships OpenSSL 3.0; Argon2id via EVP_KDF_fetch needs
      # 3.2+. Build 3.3 from source once and cache it.
      - name: Cache OpenSSL 3.3 (Ubuntu)
        if: runner.os == 'Linux'
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: /usr/local/openssl-3.3
          key: ${{ runner.os }}-openssl-3.3.2-v1
      - name: Build OpenSSL 3.3 (Ubuntu, cache miss)
        if: runner.os == 'Linux' && steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          curl -fsSL https://www.openssl.org/source/openssl-3.3.2.tar.gz -o openssl.tgz
          tar -xzf openssl.tgz
          cd openssl-3.3.2
          ./Configure --prefix=/usr/local/openssl-3.3 --libdir=lib64 \
            no-tests no-docs no-apps linux-x86_64
          make -j"$(nproc)" build_libs
          sudo make install_dev install_runtime_libs
      - name: Export OPENSSL_PREFIX (Ubuntu)
        if: runner.os == 'Linux'
        run: echo "OPENSSL_PREFIX=/usr/local/openssl-3.3" >> "$GITHUB_ENV"

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Cache C object files
        uses: actions/cache@v4
        with:
          path: traffic_cypher_in_C/src_c/*.o
          key: ${{ runner.os }}-c-${{ hashFiles('traffic_cypher_in_C/Makefile', 'traffic_cypher_in_C/src_c/**', 'traffic_cypher_in_C/include/**') }}

      - name: make clean && make
        run: |
          make -C traffic_cypher_in_C clean
          make -C traffic_cypher_in_C

  c-traffic-entropy:
    # NEXT_STEPS.md Phase A: exercise the opt-in ENABLE_TRAFFIC_ENTROPY=1 build
    # end-to-end. Builds C with the flag, asserts the binary-string flip,
    # builds Rust (needed for parity), installs yt-dlp+ffmpeg, then runs both
    # the build-only regression (tests/33) and the parity-variant smoke
    # (BUILD_VARIANT=traffic_entropy → all 4 anchor cases must agree under
    # the flag; this is the safety net for the future default-flip).
    #
    # Kept parallel to `c` and `rust` (no `needs:`) so a break here doesn't
    # block the default-build test matrix.
    name: c-traffic-entropy (${{ matrix.os }})
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Re-use the OpenSSL 3.3 cache the `c` job populates — same key, same
      # path, so a cache miss here only happens when the `c` job also missed.
      - name: Cache OpenSSL 3.3 (Ubuntu)
        if: runner.os == 'Linux'
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: /usr/local/openssl-3.3
          key: ${{ runner.os }}-openssl-3.3.2-v1
      - name: Build OpenSSL 3.3 (Ubuntu, cache miss)
        if: runner.os == 'Linux' && steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          curl -fsSL https://www.openssl.org/source/openssl-3.3.2.tar.gz -o openssl.tgz
          tar -xzf openssl.tgz
          cd openssl-3.3.2
          ./Configure --prefix=/usr/local/openssl-3.3 --libdir=lib64 \
            no-tests no-docs no-apps linux-x86_64
          make -j"$(nproc)" build_libs
          sudo make install_dev install_runtime_libs
      - name: Export OPENSSL_PREFIX (Ubuntu)
        if: runner.os == 'Linux'
        run: echo "OPENSSL_PREFIX=/usr/local/openssl-3.3" >> "$GITHUB_ENV"

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      # Rust toolchain + cache — needed for the parity-variant step. The
      # variant runs `parity/parity_test.py` which boots one Rust PM and one
      # C PM (rebuilt out-of-tree with ENABLE_TRAFFIC_ENTROPY=1) and diffs
      # their responses for each anchor case.
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: traffic_cypher_in_Rust

      - name: cargo build --release --bins --locked
        run: cargo build --release --bins --locked
        working-directory: traffic_cypher_in_Rust

      # yt-dlp + ffmpeg for the async pipeline e2e check. tests/37 does NOT
      # require them to be present — it tests the resolve-failure path with
      # a bogus URL — but parity's stream-related cases (streams_status)
      # benefit from both being available.
      - name: Install yt-dlp + ffmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
          # yt-dlp via pip — apt's version is often months behind YouTube.
          python3 -m pip install --user --quiet yt-dlp
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install yt-dlp + ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg yt-dlp

      - name: make ENABLE_TRAFFIC_ENTROPY=1
        run: make -C traffic_cypher_in_C ENABLE_TRAFFIC_ENTROPY=1

      - name: Verify build_info literal flipped
        run: |
          strings traffic_cypher_in_C/traffic-cypher-pm \
            | grep -q '"traffic_entropy":true' \
            || { echo "binary missing traffic_entropy:true literal"; exit 1; }

      # tests/33: scaffolding + build-only checks (does its own out-of-tree
      # rebuild). The CI-job-name pin inside this test guards against the
      # job being renamed without updating coverage.
      - name: Run tests/33_traffic_entropy_build.sh
        run: bash tests/33_traffic_entropy_build.sh

      # tests/37: end-to-end async pipeline smoke. Bogus URL → 202 promptly
      # → slot transitions to Failed within 15s. Proves the prep pthread
      # path is alive in CI without depending on a real YouTube reachability.
      - name: Run tests/37_msm_e2e_smoke.sh
        run: bash tests/37_msm_e2e_smoke.sh

      # Parity-variant smoke: ensures the flag-on C build matches Rust on
      # every anchor case. Restore the default C binary first so the
      # variant build is the only thing under test (parity_test.py does its
      # own out-of-tree rebuild for the variant).
      - name: Restore default C build for Rust-vs-C parity
        run: |
          make -C traffic_cypher_in_C clean
          make -C traffic_cypher_in_C
      - name: Run parity smoke (BUILD_VARIANT=traffic_entropy)
        run: BUILD_VARIANT=traffic_entropy bash tests/60_parity_smoke.sh

  tests:
    name: tests (${{ matrix.os }})
    needs: [rust, c]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # Bumped from 5 → 10. The harness grew 26 → 31 tests (~170s runtime), and
    # Ubuntu setup overhead (OpenSSL 3.3 cache restore, cargo cache, rust
    # toolchain) is ~130s, so the previous 5-min cap was clipping clean runs
    # on Ubuntu (macOS finishes in ~3m47s comfortably).
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: traffic_cypher_in_Rust

      # Ubuntu 24.04 ships OpenSSL 3.0; Argon2id via EVP_KDF_fetch needs
      # 3.2+. Build 3.3 from source once and cache it.
      - name: Cache OpenSSL 3.3 (Ubuntu)
        if: runner.os == 'Linux'
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: /usr/local/openssl-3.3
          key: ${{ runner.os }}-openssl-3.3.2-v1
      - name: Build OpenSSL 3.3 (Ubuntu, cache miss)
        if: runner.os == 'Linux' && steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          curl -fsSL https://www.openssl.org/source/openssl-3.3.2.tar.gz -o openssl.tgz
          tar -xzf openssl.tgz
          cd openssl-3.3.2
          ./Configure --prefix=/usr/local/openssl-3.3 --libdir=lib64 \
            no-tests no-docs no-apps linux-x86_64
          make -j"$(nproc)" build_libs
          sudo make install_dev install_runtime_libs
      - name: Export OPENSSL_PREFIX (Ubuntu)
        if: runner.os == 'Linux'
        run: echo "OPENSSL_PREFIX=/usr/local/openssl-3.3" >> "$GITHUB_ENV"

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Restore C object cache
        uses: actions/cache@v4
        with:
          path: traffic_cypher_in_C/src_c/*.o
          key: ${{ runner.os }}-c-${{ hashFiles('traffic_cypher_in_C/Makefile', 'traffic_cypher_in_C/src_c/**', 'traffic_cypher_in_C/include/**') }}

      - name: Run regression harness
        run: bash tests/run.sh
