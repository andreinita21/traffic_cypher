name: CI

# Triggers: every push (any branch), PRs targeting main, and manual dispatch.
on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege default. Jobs requiring more (none here) would opt in explicitly.
permissions:
  contents: read

# Skip the duplicate run that fires when a PR is opened from a branch in the
# same repo (push event + pull_request event would both trigger). For fork PRs
# only the pull_request event fires, so they still run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust (${{ matrix.os }})
    # Avoid double-runs: skip the push event for PR branches that originate in
    # this repo (the pull_request event will cover them). Fork PRs are unaffected.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: traffic_cypher_in_Rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: traffic_cypher_in_Rust

      - name: cargo build --release --bins --locked
        run: cargo build --release --bins --locked

      # Pre-existing race in vault.rs::with_test_vault (env::set_var). Tracked
      # in tests/10_rust_unit_tests.sh; serialised here to match.
      - name: cargo test --release --locked (serial)
        run: cargo test --release --locked -- --test-threads=1

      # Hard gate: the pre-existing clippy lints (see PROJECT_REVIEW.md §10)
      # were cleaned up; `-D warnings` keeps regressions out of `main`.
      - name: cargo clippy --all-targets --locked -- -D warnings
        run: cargo clippy --all-targets --locked -- -D warnings

      # Hard gate since NEXT_STEPS.md Phase D (2026-05-13): every Rust source
      # in this tree is rustfmt-clean. Regressions get caught at PR review.
      - name: cargo fmt --check (gate)
        run: cargo fmt --check

  c:
    name: c (${{ matrix.os }})
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Ubuntu 24.04 ships OpenSSL 3.0; Argon2id via EVP_KDF_fetch needs
      # 3.2+. Build 3.3 from source once and cache it.
      - name: Cache OpenSSL 3.3 (Ubuntu)
        if: runner.os == 'Linux'
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: /usr/local/openssl-3.3
          key: ${{ runner.os }}-openssl-3.3.2-v1
      - name: Build OpenSSL 3.3 (Ubuntu, cache miss)
        if: runner.os == 'Linux' && steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          curl -fsSL https://www.openssl.org/source/openssl-3.3.2.tar.gz -o openssl.tgz
          tar -xzf openssl.tgz
          cd openssl-3.3.2
          ./Configure --prefix=/usr/local/openssl-3.3 --libdir=lib64 \
            no-tests no-docs no-apps linux-x86_64
          make -j"$(nproc)" build_libs
          sudo make install_dev install_runtime_libs
      - name: Export OPENSSL_PREFIX (Ubuntu)
        if: runner.os == 'Linux'
        run: echo "OPENSSL_PREFIX=/usr/local/openssl-3.3" >> "$GITHUB_ENV"

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Cache C object files
        uses: actions/cache@v4
        with:
          path: traffic_cypher_in_C/src_c/*.o
          key: ${{ runner.os }}-c-${{ hashFiles('traffic_cypher_in_C/Makefile', 'traffic_cypher_in_C/src_c/**', 'traffic_cypher_in_C/include/**') }}

      - name: make clean && make
        run: |
          make -C traffic_cypher_in_C clean
          make -C traffic_cypher_in_C

  c-os-only:
    # NEXT_STEPS.md Phase C: exercise the opt-out ENABLE_TRAFFIC_ENTROPY=0
    # build. After the default-flip (2026-05-13), `make` produces the full
    # flag-on traffic-entropy binary — the regular `c` job covers it
    # implicitly. This job rebuilds with ENABLE_TRAFFIC_ENTROPY=0 to confirm
    # the legacy OS-only path still compiles and that tests/33's invariants
    # (501 on add_stream, traffic_entropy:false in build_info, no phone
    # routes) still hold. Lets operators roll back to the pre-#1a behaviour
    # for one release cycle.
    #
    # Kept parallel to `c` and `rust` (no `needs:`) so a break here doesn't
    # block the default test matrix.
    #
    # Renamed 2026-05-13 from c-traffic-entropy (which built the then-opt-in
    # flag-on variant). Test 33 pins this job name; if you rename again,
    # update tests/33_os_only_build.sh too.
    name: c-os-only (${{ matrix.os }})
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Re-use the OpenSSL 3.3 cache the `c` job populates — same key, same
      # path, so a cache miss here only happens when the `c` job also missed.
      - name: Cache OpenSSL 3.3 (Ubuntu)
        if: runner.os == 'Linux'
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: /usr/local/openssl-3.3
          key: ${{ runner.os }}-openssl-3.3.2-v1
      - name: Build OpenSSL 3.3 (Ubuntu, cache miss)
        if: runner.os == 'Linux' && steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          curl -fsSL https://www.openssl.org/source/openssl-3.3.2.tar.gz -o openssl.tgz
          tar -xzf openssl.tgz
          cd openssl-3.3.2
          ./Configure --prefix=/usr/local/openssl-3.3 --libdir=lib64 \
            no-tests no-docs no-apps linux-x86_64
          make -j"$(nproc)" build_libs
          sudo make install_dev install_runtime_libs
      - name: Export OPENSSL_PREFIX (Ubuntu)
        if: runner.os == 'Linux'
        run: echo "OPENSSL_PREFIX=/usr/local/openssl-3.3" >> "$GITHUB_ENV"

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: make ENABLE_TRAFFIC_ENTROPY=0
        run: make -C traffic_cypher_in_C ENABLE_TRAFFIC_ENTROPY=0

      - name: Verify opt-out build_info literal
        run: |
          strings traffic_cypher_in_C/traffic-cypher-pm \
            | grep -q '"traffic_entropy":false' \
            || { echo "opt-out binary missing traffic_entropy:false literal"; exit 1; }
          strings traffic_cypher_in_C/traffic-cypher-pm \
            | grep -q '"traffic_entropy":true' \
            && { echo "opt-out binary unexpectedly contains :true literal"; exit 1; } \
            || true

      # tests/33: opt-out build regression (does its own out-of-tree rebuild
      # with ENABLE_TRAFFIC_ENTROPY=0). Covers the legacy 501/no-phone-route
      # behaviour. The CI-job-name pin inside this test guards against the
      # job being renamed without updating coverage.
      - name: Run tests/33_os_only_build.sh
        run: bash tests/33_os_only_build.sh

  fuzz-rust:
    # NEXT_STEPS.md Phase E: 60s libFuzzer smoke per Rust target on every
    # push. cargo-fuzz needs nightly. Targets live in
    # traffic_cypher_in_Rust/fuzz/fuzz_targets/ (NOT in the parent
    # workspace — see the comment block in fuzz/Cargo.toml). Persists
    # corpus across runs via actions/cache so coverage compounds.
    name: fuzz-rust (ubuntu)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo-fuzz install + parent target dir
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            traffic_cypher_in_Rust
            traffic_cypher_in_Rust/fuzz
          # Cargo-fuzz itself goes under ~/.cargo/bin via `cargo install`;
          # Swatinem's action caches that automatically.

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      # Corpus seeds are committed; the cache layers any new units found
      # by earlier runs on top, so coverage grows monotonically. Key on
      # the workflow file's SHA so a CI overhaul resets the cache cleanly.
      - name: Restore fuzz corpus
        uses: actions/cache@v4
        with:
          path: traffic_cypher_in_Rust/fuzz/corpus
          key: ${{ runner.os }}-fuzz-rust-corpus-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-fuzz-rust-corpus-

      # 60s per target. -error_exitcode=1 forces libFuzzer to exit non-zero
      # on any crash so the job fails (default is exit-with-the-crashing-process).
      - name: cargo +nightly fuzz run vault_version_probe (60s)
        working-directory: traffic_cypher_in_Rust
        run: cargo +nightly fuzz run vault_version_probe -- -max_total_time=60 -error_exitcode=1
      - name: cargo +nightly fuzz run vault_v3_envelope (60s)
        working-directory: traffic_cypher_in_Rust
        run: cargo +nightly fuzz run vault_v3_envelope -- -max_total_time=60 -error_exitcode=1

      # Surface crash inputs as workflow artifacts so a maintainer can grab
      # the minimal reproducer without re-running locally.
      - name: Upload crashes (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-rust-crashes
          path: |
            traffic_cypher_in_Rust/fuzz/artifacts/**
          if-no-files-found: ignore

  fuzz-c:
    # NEXT_STEPS.md Phase E: 60s libFuzzer smoke per C target on every push.
    # ubuntu-latest ships clang with libFuzzer + ASan; the macOS combo is
    # documented-broken (see traffic_cypher_in_C/Makefile FUZZ_SANITIZER
    # comment) — Linux-only is the right matrix here.
    name: fuzz-c (ubuntu)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache OpenSSL 3.3 (Ubuntu)
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: /usr/local/openssl-3.3
          key: ${{ runner.os }}-openssl-3.3.2-v1
      - name: Build OpenSSL 3.3 (cache miss)
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          curl -fsSL https://www.openssl.org/source/openssl-3.3.2.tar.gz -o openssl.tgz
          tar -xzf openssl.tgz
          cd openssl-3.3.2
          ./Configure --prefix=/usr/local/openssl-3.3 --libdir=lib64 \
            no-tests no-docs no-apps linux-x86_64
          make -j"$(nproc)" build_libs
          sudo make install_dev install_runtime_libs
      - name: Export OPENSSL_PREFIX
        run: echo "OPENSSL_PREFIX=/usr/local/openssl-3.3" >> "$GITHUB_ENV"

      - name: Restore fuzz corpus
        uses: actions/cache@v4
        with:
          path: traffic_cypher_in_C/fuzz_c/corpus
          key: ${{ runner.os }}-fuzz-c-corpus-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-fuzz-c-corpus-

      # Linux clang supports the fuzzer+address sanitizer combo (the macOS
      # arm64 issue documented in the Makefile doesn't apply here).
      - name: Build fuzz targets (clang + fuzzer,address)
        run: make -C traffic_cypher_in_C fuzz FUZZ_CC=clang FUZZ_SANITIZER=fuzzer,address

      - name: Run fuzz_hex_decode (60s)
        run: |
          cd traffic_cypher_in_C
          ./fuzz_c/fuzz_hex_decode fuzz_c/corpus/fuzz_hex_decode \
            -max_total_time=60 -error_exitcode=1
      - name: Run fuzz_json_get_string (60s)
        run: |
          cd traffic_cypher_in_C
          ./fuzz_c/fuzz_json_get_string fuzz_c/corpus/fuzz_json_get_string \
            -max_total_time=60 -error_exitcode=1
      - name: Run fuzz_parse_vault_entries (60s)
        run: |
          cd traffic_cypher_in_C
          ./fuzz_c/fuzz_parse_vault_entries fuzz_c/corpus/fuzz_parse_vault_entries \
            -max_total_time=60 -error_exitcode=1

      - name: Upload crashes (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-c-crashes
          path: |
            traffic_cypher_in_C/fuzz_c/crash-*
            traffic_cypher_in_C/fuzz_c/leak-*
            traffic_cypher_in_C/fuzz_c/oom-*
          if-no-files-found: ignore

  tests:
    name: tests (${{ matrix.os }})
    needs: [rust, c]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # Bumped from 5 → 10. The harness grew 26 → 31 tests (~170s runtime), and
    # Ubuntu setup overhead (OpenSSL 3.3 cache restore, cargo cache, rust
    # toolchain) is ~130s, so the previous 5-min cap was clipping clean runs
    # on Ubuntu (macOS finishes in ~3m47s comfortably).
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: traffic_cypher_in_Rust

      # Ubuntu 24.04 ships OpenSSL 3.0; Argon2id via EVP_KDF_fetch needs
      # 3.2+. Build 3.3 from source once and cache it.
      - name: Cache OpenSSL 3.3 (Ubuntu)
        if: runner.os == 'Linux'
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: /usr/local/openssl-3.3
          key: ${{ runner.os }}-openssl-3.3.2-v1
      - name: Build OpenSSL 3.3 (Ubuntu, cache miss)
        if: runner.os == 'Linux' && steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          curl -fsSL https://www.openssl.org/source/openssl-3.3.2.tar.gz -o openssl.tgz
          tar -xzf openssl.tgz
          cd openssl-3.3.2
          ./Configure --prefix=/usr/local/openssl-3.3 --libdir=lib64 \
            no-tests no-docs no-apps linux-x86_64
          make -j"$(nproc)" build_libs
          sudo make install_dev install_runtime_libs
      - name: Export OPENSSL_PREFIX (Ubuntu)
        if: runner.os == 'Linux'
        run: echo "OPENSSL_PREFIX=/usr/local/openssl-3.3" >> "$GITHUB_ENV"

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Restore C object cache
        uses: actions/cache@v4
        with:
          path: traffic_cypher_in_C/src_c/*.o
          key: ${{ runner.os }}-c-${{ hashFiles('traffic_cypher_in_C/Makefile', 'traffic_cypher_in_C/src_c/**', 'traffic_cypher_in_C/include/**') }}

      - name: Run regression harness
        run: bash tests/run.sh
